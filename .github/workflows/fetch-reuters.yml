name: Fetch Multi-Source News

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run multi-source crawler
        run: python fetch_news.py

      - name: Commit and push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "News Crawler Bot"
          git config user.email "bot@news-crawler.local"
          git add articles.json last_run.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            ts=$(date -u '+%Y-%m-%d %H:%M')
            git commit -m "📰 Update: ${ts} UTC"
            git push
          fi
