name: Fetch Reuters News

on:
  schedule:
    # 每5分钟运行一次（GitHub Actions 最低频率）
    - cron: '*/5 * * * *'
  workflow_dispatch: # 手动触发

permissions:
  contents: write # 允许 commit 推送

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run crawler
        id: crawl
        run: python fetch_reuters.py

      - name: Commit changes
        run: |
          git config user.name "Reuters News Bot"
          git config user.email "bot@reuters-news.local"
          git add articles.json last_run.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "📰 Update: $(date -u '+%Y-%m-%d %H:%M') UTC - ${{ steps.crawl.outputs.summary }}"
            git push
          fi
